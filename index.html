<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List App</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#ec70f7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="To-Do" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ec70f7ff;
      --surface: #18181c;
      --surface2: #01010aff;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --accent: #0aee38ff;
      --accent-dim: rgba(200,245,72,0.12);
      --text: #f0f0f0;
      --text-muted: #f2e2e2ff;
      --text-dim: #555;
      --danger: #ff6b6b;
      --danger-dim: rgba(255,107,107,0.12);
      --radius: 14px;
      --radius-sm: 8px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem 5rem;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(230,213,213,1) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }
    .app { position: relative; z-index: 1; width: 100%; max-width: 520px; }
    .header { margin-bottom: 2.5rem; }
    .header-tag {
      font-family: 'Syne', sans-serif;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--accent); background: var(--accent-dim);
      display: inline-block; padding: 4px 12px;
      border-radius: 100px; margin-bottom: 14px;
    }
    h1 { font-family: 'Syne', sans-serif; font-size: clamp(2rem,6vw,2.8rem); font-weight: 800; line-height: 1.1; color: var(--text); }
    h1 span { color: var(--accent); }
    .header-sub { font-size: 14px; color: var(--text-muted); margin-top: 8px; }

    /* INSTALL BANNER */
    .install-banner {
      display: none; background: var(--surface);
      border: 1px solid var(--accent); border-radius: var(--radius);
      padding: 12px 16px; margin-bottom: 1rem;
      align-items: center; gap: 10px;
      animation: slideIn 0.3s ease;
    }
    .install-banner.show { display: flex; }
    .install-banner p { flex: 1; font-size: 13px; color: var(--text-muted); }
    .install-banner p strong { color: var(--text); }
    .btn-install {
      background: var(--accent); color: #0f0f11; border: none;
      border-radius: var(--radius-sm); padding: 8px 14px;
      font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
      cursor: pointer; white-space: nowrap;
    }
    .btn-dismiss { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 18px; padding: 2px 6px; }

    .input-area { display: flex; gap: 10px; margin-bottom: 1.5rem; }
    .input-area input {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 18px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text);
      outline: none; transition: border-color 0.2s;
    }
    .input-area input::placeholder { color: var(--text-dim); }
    .input-area input:focus { border-color: var(--accent); }
    .btn-add {
      background: var(--accent); color: #0f0f11; border: none;
      border-radius: var(--radius); padding: 14px 22px;
      font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
      cursor: pointer; white-space: nowrap;
      transition: transform 0.15s, opacity 0.15s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-add:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-add:active { transform: scale(0.97); }

    .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1.5rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; text-align: center; }
    .stat-number { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: var(--text); line-height: 1; margin-bottom: 4px; }
    .stat-number.accent { color: var(--accent); }
    .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }

    /* PROGRESS BAR */
    .progress-wrap { margin-bottom: 1.25rem; }
    .progress-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .progress-track { background: var(--surface); border-radius: 100px; height: 8px; overflow: hidden; border: 1px solid var(--border); }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 100px; transition: width 0.4s ease; width: 0%; }

    .filter-bar {
      display: flex; gap: 6px; margin-bottom: 1.25rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 5px;
    }
    .filter-btn {
      flex: 1; background: none; border: none; border-radius: var(--radius-sm);
      padding: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px;
      font-weight: 500; color: var(--text-muted); cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .filter-btn.active { background: var(--surface2); color: var(--accent); }
    .filter-btn:not(.active):hover { color: var(--text); }

    #taskList { display: flex; flex-direction: column; gap: 8px; }
    .task-item {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      transition: border-color 0.2s, opacity 0.2s;
      animation: slideIn 0.2s ease; cursor: grab;
    }
    .task-item:active { cursor: grabbing; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .task-item:hover { border-color: var(--border-hover); }
    .task-item.done { opacity: 0.5; }
    .task-item.dragging { opacity: 0.3; border: 2px dashed var(--accent); }
    .task-item.drag-over { border-color: var(--accent); background: rgba(10,238,56,0.05); }

    .check-btn {
      width: 24px; height: 24px; border-radius: 50%;
      border: 1.5px solid var(--text-dim); background: none;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
      transition: border-color 0.15s, background 0.15s;
      color: transparent; font-size: 13px;
    }
    .task-item.done .check-btn { border-color: var(--accent); background: var(--accent); color: #0f0f11; }

    .priority-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 100px; text-transform: uppercase; letter-spacing: 0.05em; flex-shrink: 0; }
    .priority-high   { background: rgba(255,107,107,0.2); color: #ff6b6b; }
    .priority-medium { background: rgba(255,211,61,0.2);  color: #ffd33d; }
    .priority-low    { background: rgba(10,238,56,0.15);  color: var(--accent); }

    .task-text { flex: 1; font-size: 15px; color: var(--text); line-height: 1.4; word-break: break-word; }
    .task-item.done .task-text { text-decoration: line-through; color: var(--text-muted); }
    .task-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .task-date { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
    .task-deadline { font-size: 11px; background: var(--accent-dim); color: var(--accent); padding: 2px 8px; border-radius: 100px; white-space: nowrap; }
    .task-deadline.overdue { background: var(--danger-dim); color: var(--danger); }
    .task-actions { display: flex; gap: 4px; }
    .icon-btn {
      background: none; border: none; width: 30px; height: 30px;
      border-radius: var(--radius-sm); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-dim); font-size: 16px;
      transition: background 0.15s, color 0.15s;
    }
    .icon-btn:hover { background: var(--surface2); color: var(--text); }
    .icon-btn.delete:hover { color: var(--danger); }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px); z-index: 100;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border: 1px solid var(--border-hover);
      border-radius: calc(var(--radius) + 4px); padding: 1.5rem;
      width: 100%; max-width: 420px;
      transform: translateY(10px); transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal h3 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 1rem; color: var(--text); }
    .modal label { display: block; font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; margin-top: 14px; }
    .modal input, .modal textarea, .modal select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 14px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text);
      outline: none; transition: border-color 0.2s; resize: vertical;
    }
    .modal select option { background: #18181c; }
    .modal input:focus, .modal textarea:focus, .modal select:focus { border-color: var(--accent); }
    .modal input[type="date"] { color-scheme: dark; }
    .modal-actions { display: flex; gap: 8px; margin-top: 1.25rem; }
    .btn-save {
      flex: 1; background: var(--accent); color: #0f0f11; border: none;
      border-radius: var(--radius-sm); padding: 11px;
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: opacity 0.15s;
    }
    .btn-save:hover { opacity: 0.85; }
    .btn-cancel {
      background: var(--surface2); color: var(--text-muted);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 11px 18px; font-family: 'DM Sans', sans-serif;
      font-size: 13px; cursor: pointer; transition: color 0.15s;
    }
    .btn-cancel:hover { color: var(--text); }

    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-dim); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
    .empty-state p { font-size: 14px; }
    .footer-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; font-size: 13px; color: var(--text-muted); }
    .btn-clear {
      background: none; border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 6px 14px; font-family: 'DM Sans', sans-serif; font-size: 13px;
      color: var(--text-muted); cursor: pointer; transition: border-color 0.15s, color 0.15s;
    }
    .btn-clear:hover { border-color: var(--danger); color: var(--danger); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-tag">✦ luthfi rajab</div>
    <h1>To‑Do <span>List</span></h1>
    <p class="header-sub">Catat, kelola, dan selesaikan tugasmu.</p>
  </div>

  <div class="install-banner" id="installBanner">
    <p><strong>Install App</strong><br>Tambahkan ke layar utama HP kamu!</p>
    <button class="btn-install" id="btnInstall">Install</button>
    <button class="btn-dismiss" id="btnDismiss">×</button>
  </div>

  <div class="input-area">
    <input type="text" id="taskInput" placeholder="Tambah tugas baru..." />
    <button class="btn-add" onclick="addTask()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Tambah
    </button>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="stat-number" id="statTotal">0</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-number" id="statActive">0</div><div class="stat-label">Aktif</div></div>
    <div class="stat-card"><div class="stat-number accent" id="statDone">0</div><div class="stat-label">Selesai</div></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-info"><span>Progress</span><span id="progressText">0%</span></div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" id="f-all" onclick="setFilter('all')">Semua</button>
    <button class="filter-btn" id="f-active" onclick="setFilter('active')">Aktif</button>
    <button class="filter-btn" id="f-done" onclick="setFilter('done')">Selesai</button>
  </div>

  <div id="taskList"></div>
  <div class="empty-state" id="emptyState" style="display:none;"><div class="empty-icon">📋</div><p>Belum ada tugas di sini.</p></div>
  <div class="footer-bar" id="footerBar" style="display:none;">
    <span id="footerText"></span>
    <button class="btn-clear" onclick="clearDone()">Hapus selesai</button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <h3>Edit Tugas</h3>
    <label>Nama Tugas</label>
    <input type="text" id="editText" placeholder="Nama tugas..." />
    <label>Catatan (opsional)</label>
    <textarea id="editNote" rows="3" placeholder="Tambahkan catatan..."></textarea>
    <label>Prioritas</label>
    <select id="editPriority">
      <option value="">— Tanpa Prioritas —</option>
      <option value="high">🔴 High</option>
      <option value="medium">🟡 Medium</option>
      <option value="low">🟢 Low</option>
    </select>
    <label>Deadline (opsional)</label>
    <input type="date" id="editDeadline" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModalDirect()">Batal</button>
      <button class="btn-save" onclick="saveEdit()">Simpan</button>
    </div>
  </div>
</div>

<script>
  let tasks = [], nextId = 1, filter = 'all', editingId = null, deferredPrompt = null, dragSrcId = null;

  const defaultTasks = [
    { id:1, text:"Belajar HTML & CSS dasar",       done:true,  note:"",                     priority:"",       deadline:"",                                                    createdAt:Date.now()-86400000 },
    { id:2, text:"Buat proyek To-Do List ini",     done:false, note:"Latihan JavaScript DOM",priority:"high",   deadline:"",                                                    createdAt:Date.now()-3600000  },
    { id:3, text:"Latihan JavaScript setiap hari", done:false, note:"",                     priority:"medium", deadline:new Date(Date.now()+86400000).toISOString().split('T')[0], createdAt:Date.now()          },
  ];

  function save() { localStorage.setItem('todo_tasks', JSON.stringify(tasks)); }
  function load() {
    const d = localStorage.getItem('todo_tasks');
    tasks = d ? JSON.parse(d) : defaultTasks;
    if (!d) save();
    nextId = tasks.reduce((m,t) => Math.max(m,t.id), 0) + 1;
  }

  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text) { input.focus(); return; }
    tasks.unshift({ id:nextId++, text, done:false, note:"", priority:"", deadline:"", createdAt:Date.now() });
    input.value = ''; filter = 'all'; save(); render(); input.focus();
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id===id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function deleteTask(id) { tasks = tasks.filter(t => t.id!==id); save(); render(); }

  function openEdit(id) {
    editingId = id;
    const t = tasks.find(t => t.id===id);
    document.getElementById('editText').value     = t.text;
    document.getElementById('editNote').value     = t.note || '';
    document.getElementById('editPriority').value = t.priority || '';
    document.getElementById('editDeadline').value = t.deadline || '';
    document.getElementById('modalOverlay').classList.add('open');
  }

  function saveEdit() {
    const t = tasks.find(t => t.id===editingId);
    if (!t) return;
    const newText = document.getElementById('editText').value.trim();
    if (!newText) return;
    t.text     = newText;
    t.note     = document.getElementById('editNote').value.trim();
    t.priority = document.getElementById('editPriority').value;
    t.deadline = document.getElementById('editDeadline').value;
    save(); render(); closeModalDirect();
  }

  function closeModal(e) { if (e.target===document.getElementById('modalOverlay')) closeModalDirect(); }
  function closeModalDirect() { document.getElementById('modalOverlay').classList.remove('open'); editingId=null; }
  function clearDone() { tasks=tasks.filter(t=>!t.done); save(); render(); }

  function setFilter(f) {
    filter = f;
    ['all','active','done'].forEach(k => document.getElementById('f-'+k).classList.toggle('active', k===f));
    render();
  }

  function addDragEvents() {
    document.querySelectorAll('.task-item').forEach(el => {
      el.addEventListener('dragstart', () => { dragSrcId=parseInt(el.dataset.id); el.classList.add('dragging'); });
      el.addEventListener('dragend',   () => { el.classList.remove('dragging'); document.querySelectorAll('.task-item').forEach(i=>i.classList.remove('drag-over')); });
      el.addEventListener('dragover',  e => { e.preventDefault(); el.classList.add('drag-over'); });
      el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
      el.addEventListener('drop', () => {
        const toId = parseInt(el.dataset.id);
        if (dragSrcId===toId) return;
        const fi = tasks.findIndex(t=>t.id===dragSrcId), ti = tasks.findIndex(t=>t.id===toId);
        const [moved] = tasks.splice(fi,1); tasks.splice(ti,0,moved);
        save(); render();
      });
    });
  }

  function formatDate(ts) { return new Date(ts).toLocaleDateString('id-ID',{day:'numeric',month:'short'}); }
  function deadlineLabel(dl) {
    if (!dl) return null;
    const today = new Date().toISOString().split('T')[0];
    const overdue = dl < today;
    const label = new Date(dl).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});
    return { label:(overdue?'⚠ ':'📅 ')+label, overdue };
  }
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function render() {
    const filtered = tasks.filter(t => filter==='all'?true:filter==='done'?t.done:!t.done);
    const total=tasks.length, done=tasks.filter(t=>t.done).length, active=tasks.filter(t=>!t.done).length;
    const pct = total===0?0:Math.round((done/total)*100);

    document.getElementById('statTotal').textContent  = total;
    document.getElementById('statActive').textContent = active;
    document.getElementById('statDone').textContent   = done;
    document.getElementById('progressFill').style.width = pct+'%';
    document.getElementById('progressText').textContent = pct+'%';

    const list=document.getElementById('taskList'), empty=document.getElementById('emptyState'), footer=document.getElementById('footerBar');

    if (filtered.length===0) { list.innerHTML=''; empty.style.display='block'; footer.style.display='none'; return; }
    empty.style.display='none'; footer.style.display='flex';
    document.getElementById('footerText').textContent = `${active} tugas tersisa`;

    list.innerHTML = filtered.map(t => {
      const dl = deadlineLabel(t.deadline);
      const pb = t.priority ? `<span class="priority-badge priority-${t.priority}">${t.priority}</span>` : '';
      return `
        <div class="task-item ${t.done?'done':''}" data-id="${t.id}" draggable="true">
          <button class="check-btn" onclick="toggleTask(${t.id})">
            ${t.done?`<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>`:''}
          </button>
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">${pb}<div class="task-text">${esc(t.text)}</div></div>
            ${t.note?`<div style="font-size:12px;color:var(--text-muted);margin-top:3px;">${esc(t.note)}</div>`:''}
          </div>
          <div class="task-meta">
            <div class="task-date">${formatDate(t.createdAt)}</div>
            ${dl?`<div class="task-deadline ${dl.overdue?'overdue':''}">${dl.label}</div>`:''}
          </div>
          <div class="task-actions">
            <button class="icon-btn" onclick="openEdit(${t.id})"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
            <button class="icon-btn delete" onclick="deleteTask(${t.id})"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
          </div>
        </div>`;
    }).join('');
    addDragEvents();
  }

  // PWA Install
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault(); deferredPrompt = e;
    document.getElementById('installBanner').classList.add('show');
  });
  document.getElementById('btnInstall').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('installBanner').classList.remove('show');
  });
  document.getElementById('btnDismiss').addEventListener('click', () => document.getElementById('installBanner').classList.remove('show'));
  window.addEventListener('appinstalled', () => document.getElementById('installBanner').classList.remove('show'));

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./service-worker.js');

  document.getElementById('taskInput').addEventListener('keydown', e => { if (e.key==='Enter') addTask(); });
  document.addEventListener('keydown', e => { if (e.key==='Escape') closeModalDirect(); });

  load(); render();
</script>
</body>
</html>
